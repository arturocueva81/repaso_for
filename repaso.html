<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repaso Ciclo FOR</title>
    <link rel="stylesheet" href="repaso.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <script src="repaso.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Repaso Ciclo FOR</h1>
        </header>
        
        <main>
            <section class="exercise-section">
                <h2>🔥Loops Básicos (Ascendentes y descendentes)</h2>
                <div class="button-group">
                    <button class="btn btn-primary" onclick="mostrar(1)">Ejercicio 1</button>
                    <button class="btn btn-primary" onclick="mostrar(2)">Centenas</button>
                    <button class="btn btn-primary" onclick="mostrar(3)">Centenas Regresivo</button>
                </div>
            </section>
            
            <section class="exercise-section">
                <h2>💬 3 Mensajes  (bajo ciertas condiciones)</h2>
                <div class="button-group">
                    <button class="btn btn-secondary" onclick="mostrar(4)">Mensaje 1</button>
                    <button class="btn btn-secondary" onclick="mostrar(5)">Mensaje 2</button>
                    <button class="btn btn-secondary" onclick="mostrar(6)">Mensaje 3</button>
                    <button class="btn btn-secondary" onclick="mostrar(7)">Mensaje 4</button>
                </div>
            </section>
            
            <section class="exercise-section">
                <h2>✖️ Tablas de multiplicar</h2>
                <div class="button-group">
                    <button class="btn btn-tertiary" onclick="mostrar(8)">1</button>
                    <button class="btn btn-tertiary" onclick="mostrar(9)">2</button>
                    <button class="btn btn-tertiary" onclick="mostrar(10)">3</button>
                    <button class="btn btn-tertiary" onclick="mostrar(11)">4</button>
                    <button class="btn btn-tertiary" onclick="mostrar(12)">5</button>
                    <button class="btn btn-tertiary" onclick="mostrar(13)">6</button>
                    <button class="btn btn-tertiary" onclick="mostrar(14)">7</button>
                    <button class="btn btn-tertiary" onclick="mostrar(15)">8</button>
                    <button class="btn btn-tertiary" onclick="mostrar(16)">9</button>
                    <button class="btn btn-tertiary" onclick="mostrar(17)">10</button>
                </div>
            </section>
        </main>
        
        <footer>
            <p> Powered by Arturo Cueva</p>
        </footer>
    </div>
</body>
</html>
